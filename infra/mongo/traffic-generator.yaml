apiVersion: v1
kind: Pod
metadata:
  name: traffic-generator
  labels:
    name: traffic-generator
spec:
  containers:
    - name: traffic-generator
      image: 01919965532/traffic-generator:1.0.0
      args:
        - 'color-svc/api?colorKey=primary'
        - '0.5'
      resources:
        limits:
          memory: '128Mi'
          cpu: '500m'
        requests:
          memory: '64Mi'
          cpu: '250m'