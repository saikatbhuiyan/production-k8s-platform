apiVersion: v1
kind: ConfigMap
metadata:
  name: mongo-init-colordb
  labels:
    app: mongo
data:
  init-colordb.js: |
    const dbName = process.env.DB_NAME;
    const dbUser = process.env.DB_USER;
    const dbPassword = process.env.DB_PASSWORD;

    db = db.getSiblingDB(dbName);

    console.log(`Creating user '${dbUser}' with readWrite role on database '${dbName}'...`);

    db.createUser({
      user: dbUser,
      pwd: dbPassword,
      roles: [
        {
          role: "readWrite",
          db: dbName
        }
      ]
    });

    console.log(`User '${dbUser}' created successfully.`);