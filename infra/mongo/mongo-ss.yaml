apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-ss
spec:
  selector:
    matchLabels:
      app: mongo
  serviceName: mongo-svc
  replicas: 1
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:8.0.0
          ports:
          - containerPort: 27017
          env:
          - name: MONGO_INITDB_ROOT_USERNAME
            valueFrom:
              secretKeyRef:
                name: mongo-root-creds
                key: username
          - name: MONGO_INITDB_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mongo-root-creds
                key: password
          - name: DB_NAME
            value: colordb
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: mongo-colordb-creds
                key: username
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mongo-colordb-creds
                key: password
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
            - name: mongo-init-config
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: mongo-init-config
          configMap:
            name: mongo-init-colordb     
  volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: standard
      resources:
        requests:
          storage: 4Gi
