apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: mongo-express
spec:
  ingressClassName: nginx-ingress
  rules:
  - host: YOUR_HOST_DNS_NAME
    http:
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: mongo-express-service
              port:
                number: 8081
